<ion-header [translucent]="true">
  <ion-toolbar class="custom-toolbar">
    <div class="header-content">
      <div class="title-section">
        <ion-icon name="heart" class="header-icon"></ion-icon>
        <span class="header-title">Adote</span>
      </div>
      <div class="search-section">
        <ion-icon
          [name]="showSearch ? 'close-outline' : 'search-outline'"
          class="header-icon"
          (click)="toggleSearch()">
        </ion-icon>
      </div>
    </div>

    <!-- Barra de busca -->
    <div class="search-bar-wrapper" [class.visible]="showSearch">
      <div class="search-input-wrapper">
        <ion-icon name="search-outline" class="search-input-icon"></ion-icon>
        <input
          class="search-input"
          placeholder="Buscar animal..."
          [(ngModel)]="termoBusca"
          (input)="filtrar()">
        <ion-icon
          *ngIf="termoBusca"
          name="close-circle-outline"
          class="search-clear-icon"
          (click)="limparBusca()">
        </ion-icon>
      </div>
    </div>
  </ion-toolbar>
</ion-header>

<ion-content [scrollY]="true">
  <div class="lista-adocoes">

    <div *ngIf="petsFiltrados.length === 0" class="sem-resultados">
      <ion-icon name="paw-outline" class="sem-resultados-icon"></ion-icon>
      <p>Nenhum animal encontrado</p>
    </div>

    <div
      class="pet-card"
      *ngFor="let pet of petsFiltrados"
      (click)="abrirDetalhe(pet)">
      <div class="pet-header">
        <span>{{ pet.titulo }}</span>
        <span>{{ pet.idade }}</span>
      </div>
      <div class="pet-content">
        <img [src]="pet.imagem" [alt]="pet.titulo" class="pet-image">
        <div class="pet-info">{{ pet.descricao }}</div>
      </div>
    </div>

  </div>
</ion-content>
